openapi: 3.0.0

info:
  title: API de Progreso — MMO
  version: 1.0.0
  description: Inscripciones, avance de contenido e intentos de quiz.

servers:
  - url: http://localhost:3003/api/v1

tags:
  - name: Inscripciones
  - name: Progreso
  - name: Intentos de Quiz

paths:
  /inscripciones:
    get:
      tags: [Inscripciones]
      summary: Listar mis inscripciones
      security: [{bearerAuth: []}]
      responses:
        '200': {description: Inscripciones del estudiante}
    post:
      tags: [Inscripciones]
      summary: Inscribirse a un curso
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/InscripcionRequest'}
      responses:
        '201': {description: Inscripción realizada}
        '400': {description: Ya inscrito o datos inválidos}

  /inscripciones/cursos/{idCurso}/progreso:
    get:
      tags: [Inscripciones]
      summary: Consultar progreso en un curso (para reanudar donde quedó)
      security: [{bearerAuth: []}]
      parameters:
        - {name: idCurso, in: path, required: true, schema: {type: integer}}
      responses:
        '200': {description: Progreso en el curso}
        '404': {description: No inscrito}

  /progreso:
    post:
      tags: [Progreso]
      summary: Marcar avance de un ítem de contenido
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ProgresoRequest'}
      responses:
        '200': {description: Avance registrado}

  /intentos:
    post:
      tags: [Intentos de Quiz]
      summary: Iniciar un intento de quiz
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/IntentoRequest'}
      responses:
        '201': {description: Intento iniciado}

  /intentos/{id}:
    get:
      tags: [Intentos de Quiz]
      summary: Obtener un intento
      security: [{bearerAuth: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
      responses:
        '200': {description: Intento encontrado}

  /intentos/{id}/respuestas:
    post:
      tags: [Intentos de Quiz]
      summary: Registrar respuestas y calcular puntaje
      security: [{bearerAuth: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/RespuestasRequest'}
      responses:
        '200': {description: Respuestas registradas y puntaje calculado}

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    InscripcionRequest:
      type: object
      required: [id_curso]
      properties:
        id_curso: {type: integer}

    ProgresoRequest:
      type: object
      required: [id_inscripcion, id_item_contenido]
      properties:
        id_inscripcion: {type: integer}
        id_item_contenido: {type: integer}
        segundos_vistos: {type: integer, minimum: 0}

    IntentoRequest:
      type: object
      required: [id_inscripcion, id_quiz, ids_preguntas]
      properties:
        id_inscripcion: {type: integer}
        id_quiz: {type: integer}
        ids_preguntas:
          type: array
          minItems: 5
          maxItems: 5
          items: {type: integer}

    RespuestasRequest:
      type: object
      required: [respuestas]
      properties:
        respuestas:
          type: array
          minItems: 1
          items:
            type: object
            required: [id_pregunta, id_opcion_seleccionada, es_correcta]
            properties:
              id_pregunta: {type: integer}
              id_opcion_seleccionada: {type: integer}
              es_correcta: {type: boolean}
